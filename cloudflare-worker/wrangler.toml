name = "tenant-guard"
main = "tenant-guard.js"
compatibility_date = "2024-01-01"

# Route: only tenant subdomains, not the root domain or admin
routes = [
  { pattern = "*.claw-me.com/*", zone_name = "claw-me.com" }
]

[vars]
BASE_DOMAIN = "claw-me.com"

# Set these as secrets (not in this file):
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SERVICE_KEY
